# Code Project Configuration - Optimization Research Exemplar
# Comprehensive research project demonstrating advanced optimization algorithms
# This file serves as a meta-artifact linking the prose of the manuscript to the execution
# layer. It is loaded by `yaml.safe_load` inside `infrastructure/rendering/_pdf_combined_renderer.py`
# (manuscript metadata) and `projects/templates/template_code_project/scripts/z_generate_manuscript_variables.py`
# (experiment parameters).

# Consumed by: `infrastructure/rendering/pdf_renderer.py` and `infrastructure/reporting/pipeline_report_model.py`
paper:
  # RASP Standard: Title must be descriptive and objective
  title: "Convergence Analysis of Gradient Descent Optimization"
  subtitle: "Theoretical Bounds and Empirical Performance in Quadratic Minimization"
  version: "2.5.1"
  date: "" # Auto-generated via `infrastructure/validation/output/validator.py` if empty

# Consumed by: `infrastructure.publishing.extract_publication_metadata` (in `infrastructure/publishing/metadata.py`)
authors:
  - name: "Daniel Ari Friedman"
    orcid: "0000-0001-6232-9096"
    email: "daniel@activeinference.institute"
    affiliation: "Active Inference Institute"
    corresponding: true

# Consumed by: `infrastructure.publishing.publish_to_zenodo` (in `infrastructure/publishing/platforms.py`)
publication:
  doi: "10.5281/zenodo.20417136" # Concept DOI — stable citation; cover page and CITATION.cff
  version_doi: "10.5281/zenodo.20692963" # Latest Zenodo deposit (updated by publish_project_release.py)
  version_record: "https://zenodo.org/records/20692963"
  github_repository: "docxology/template_code_project"
  transmission_bookends:
    enabled: true
    max_prior_releases: 5
    show_steganography: true
  deposit_filename:
    enabled: true
    topic: ""  # optional; default = first significant title word
  journal: "Journal of Optimization Methods"
  volume: "15"
  pages: "1-25"
  year: "2026"

keywords:
  - "optimization algorithms"
  - "gradient descent"
  - "convergence analysis"
  - "numerical methods"
  - "mathematical programming"
  - "reproducible research"
  - "infrastructure automation"

metadata:
  license: "MIT"
  language: "en"

# Steganography profile for secure_run.sh and transmission bookend summary.
# Precedence: infrastructure/config/secure_config.yaml < this block.
steganography:
  enabled: true
  overlays_enabled: true
  barcodes_enabled: true
  metadata_enabled: true
  hashing_enabled: true
  encryption_enabled: false
  overlay_mode: "text"
  overlay_text: "CONFIDENTIAL"

# Render format toggles — gate per-renderer in infrastructure/rendering/pipeline.py.
# Defaults: pdf/html/slides on, docx/epub off. Setting `false` makes the pipeline
# log `[skip] <format> rendering disabled in config` and emit no artifacts.
# Consumed by: `infrastructure/rendering/config.py::RenderingConfig.from_project_config`.
# Documented in `docs/operational/logging/output-design.md`.
render:
  formats:
    pdf: true
    html: true
    slides: true
    docx: true
    epub: true

# Consumed by: `infrastructure.llm.LLMClient` (in `infrastructure/llm/core/client.py`)
# See projects/templates/template_code_project/docs/ for details
llm:
  reviews:
    # Explicitly enabled for this exemplar to demonstrate AI-aided analysis
    enabled: true
    types:
      - executive_summary
      - quality_review
      - methodology_review
  translations:
    enabled: true
    languages:
      - zh

# Consumed by: `infrastructure/reporting/pipeline_report_model.py` and CI/CD gates
# ZERO-MOCK TOLERANCE: Any failure blocks manuscript rendering
testing:
  max_test_failures: 0
  max_infra_test_failures: 0
  max_project_test_failures: 0

# Experimental parameters — read by optimization_analysis.py and generate_manuscript_variables.py
experiment:
  # Agency categories:
  #   Conservative (slow convergence):  α = 0.01, 0.1
  #   Near-optimal (fast convergence):  α = 0.5, 1.0  (α=1.0 converges in 1 step for H=I)
  #   Aggressive/Oscillating:           α = 1.5  (|1-α|=0.5, converges with oscillation)
  #   Divergent:                         α = 2.5  (|1-α|=1.5 > 1, diverges)
  step_sizes: [0.01, 0.1, 0.5, 1.0, 1.5, 2.5]
  initial_point: 0.0
  max_iterations: 1000
  tolerance: 1.0e-8
  convergence_tolerance: 1.0e-8
  quadratic_A: [[1.0]]
  quadratic_b: [1.0]
  stability_starting_points: [-50.0, -10.0, -5.0, 0.0, 0.1, 5.0, 10.0, 50.0]
  stability_step_sizes: [0.01, 0.05, 0.1, 0.2, 0.5, 0.9]
  benchmark_dimensions: [1, 2, 5, 10, 20, 50]
