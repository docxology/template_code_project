conditions:
  - name: conservative_step
    role: reference
    description: "Stable gradient-descent step below the spectral bound."
  - name: near_optimal_step
    role: proposed
    description: "Template-recommended step near the stable convergence region."
  - name: aggressive_step
    role: variant
    description: "Stress condition near or above the stability boundary."
metrics:
  primary:
    name: objective_value
    direction: minimize
protocol: "Run the deterministic quadratic optimization sweep with identical initialization, seeds, tolerance, and iteration cap across all declared step-size conditions."
expected_figures:
  - fig:convergence_plot
  - fig:performance_benchmark
  - fig:step_size_sensitivity
expected_tables:
  - tbl:optimization_results
baselines:
  - conservative_step
ablations:
  - aggressive_step
